<!doctype html>
<html lang="en" data-theme="slate">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ethan's Dashboard</title>
  <meta name="description" content="Personal dashboard: Edinburgh weather and pollen, financial news, stocks, vocabulary, German practice, CIMA study tracker, EY pre-start tracker." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <script>
    // apply saved theme before paint to avoid a flash; keep the PWA chrome colour in sync
    try {
      var t = localStorage.getItem('dashboard_theme');
      var theme = t === '"amoled"' || t === 'amoled' ? 'amoled' : 'slate';
      document.documentElement.dataset.theme = theme;
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute('content', theme === 'amoled' ? '#000000' : '#0f172a');
    } catch (e) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
